name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    # nightly is informational: it must not block merges when upstream breaks.
    continue-on-error: ${{ matrix.neovim == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      # Pin a modern ripgrep: the replace feature relies on the `replacement`
      # field in `rg --json` output, which requires ripgrep 15+.
      - name: Install ripgrep
        uses: taiki-e/install-action@v2
        with:
          tool: ripgrep@15.1.0

      - name: Install Neovim (${{ matrix.neovim }})
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Show versions
        run: |
          nvim --version | head -1
          rg --version | head -1

      - name: Run test suite
        run: make test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting (stylua)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ tests/
